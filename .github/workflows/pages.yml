name: Pages

on:
  push:
    branches:
      - master
    paths:
      - "site/**"
      - "build/emscripten/**"
      - "src/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14

      - name: Build and package WebAssembly zip
        run: |
          chmod +x build/emscripten/build_emscripten.sh
          (cd build/emscripten && ./build_emscripten.sh -j4)
          stage_dir="dist/chocolate-keen-WebAssembly"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp build/emscripten/chocolate-keen.html "$stage_dir/"
          cp build/emscripten/chocolate-keen.js "$stage_dir/"
          cp build/emscripten/chocolate-keen.wasm "$stage_dir/"
          cp build/emscripten/chocolate-keen.data "$stage_dir/"
          (cd "$stage_dir" && zip -r ../chocolate-keen.zip .)
          unzip -o dist/chocolate-keen.zip -d site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
